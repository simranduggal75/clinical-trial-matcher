version: "3.9"

services:
  api:
    build: .
    container_name: clinical-trial-matcher-api
    ports:
      - "8000:8000"
    volumes:
      - ./data/processed:/app/data/processed
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build: .
    container_name: clinical-trial-matcher-ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    command: streamlit run src/api/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped